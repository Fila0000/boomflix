<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch — EmilyFlix</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    .player-page { background: #000; }
    .player-iframe-wrapper {
      width: 100%;
      position: relative;
      background: #000;
    }
    .player-iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .related-section {
      padding: 20px 4%;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--light-gray);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 16px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--white); }
    .cast-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0 20px;
      scrollbar-width: none;
    }
    .cast-row::-webkit-scrollbar { display: none; }
    .cast-card {
      flex: 0 0 100px;
      text-align: center;
    }
    .cast-card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--dark3);
      margin-bottom: 8px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .cast-name {
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cast-char {
      font-size: 0.65rem;
      color: var(--light-gray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .loading-player {
      width: 100%;
      aspect-ratio: 16/9;
      max-height: 85vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-player p {
      color: var(--light-gray);
      font-size: 0.9rem;
    }

    /* ===== TV EPISODE SELECTOR ===== */
    .tv-controls {
      padding: 20px 4%;
      max-width: 1200px;
      margin: 0 auto;
    }
    .tv-controls-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .tv-controls-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .season-select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: var(--white);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
      font-weight: 600;
    }
    .season-select:focus { border-color: rgba(255,255,255,0.5); }
    .season-select option { background: var(--dark2); }

    .episodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .episode-card {
      display: flex;
      gap: 12px;
      background: var(--dark2);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      border: 2px solid transparent;
    }
    .episode-card:hover {
      background: var(--dark3);
      transform: translateY(-2px);
    }
    .episode-card.active {
      border-color: var(--red);
      background: rgba(229,9,20,0.1);
    }
    .episode-card-thumb {
      flex: 0 0 160px;
      aspect-ratio: 16/9;
      background: var(--dark3);
      position: relative;
      overflow: hidden;
    }
    .episode-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .episode-card-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .episode-card:hover .episode-card-play { opacity: 1; }
    .episode-card-play svg {
      width: 36px;
      height: 36px;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
    }
    .episode-card-info {
      flex: 1;
      padding: 10px 12px 10px 0;
      min-width: 0;
    }
    .episode-card-number {
      font-size: 0.7rem;
      color: var(--light-gray);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .episode-card-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .episode-card-overview {
      font-size: 0.72rem;
      color: var(--light-gray);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .episode-card-runtime {
      font-size: 0.65rem;
      color: var(--gray);
      margin-top: 4px;
    }
    .next-episode-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .next-episode-btn:hover { background: var(--red-hover); }

    @media (max-width: 600px) {
      .episodes-grid {
        grid-template-columns: 1fr;
      }
      .episode-card-thumb {
        flex: 0 0 120px;
      }
    }
  </style>
</head>
<body class="player-page">

<!-- NAVBAR -->
<nav class="navbar solid" id="navbar">
  <div class="navbar-left">
    <a href="index.html" class="logo">Emily<span>Flix</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="movies.html">Movies</a></li>
      <li><a href="tv.html">TV Shows</a></li>
    </ul>
  </div>
  <div class="navbar-right">
    <button class="search-btn" onclick="window.location.href='index.html'" title="Search">🔍</button>
  </div>
</nav>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <button class="search-close" id="searchClose">✕</button>
  <div class="search-box">
    <span class="search-icon-inside">🔍</span>
    <input type="text" id="searchInput" placeholder="Search movies & TV shows..." autocomplete="off">
  </div>
  <div class="search-results-grid" id="searchResults"></div>
</div>

<!-- PLAYER -->
<div class="player-page" style="padding-top: 68px;">
  <div class="player-container">
    <div class="player-iframe-wrapper" id="playerWrapper" style="height: calc(100vw * 9/16); max-height: 85vh;">
      <div class="loading-player" id="playerLoading">
        <div class="spinner"></div>
        <p>Loading stream...</p>
      </div>
    </div>
  </div>

  <!-- TV Episode Selector (hidden for movies) -->
  <div class="tv-controls" id="tvControls" style="display:none;">
    <div class="tv-controls-header">
      <h2>Episodes</h2>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="next-episode-btn" id="nextEpisodeBtn" style="display:none;" onclick="playNextEpisode()">
          Next Episode ▶
        </button>
        <select class="season-select" id="seasonSelect"></select>
      </div>
    </div>
    <div class="episodes-grid" id="episodesGrid">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="player-info" id="playerInfo">
    <div class="skeleton" style="width:60px;height:18px;border-radius:3px;margin-bottom:16px;"></div>
    <div class="skeleton" style="width:400px;max-width:90%;height:44px;border-radius:4px;margin-bottom:12px;"></div>
    <div class="skeleton" style="width:300px;height:18px;border-radius:3px;margin-bottom:20px;"></div>
    <div class="skeleton" style="width:100%;max-width:800px;height:80px;border-radius:4px;"></div>
  </div>

  <div id="relatedContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/player.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const contentId = params.get('id');
const contentType = params.get('type') || 'movie';
let currentSeason = parseInt(params.get('season') || '1');
let currentEpisode = parseInt(params.get('episode') || '1');
let showData = null;
let seasonData = null;

if (!contentId) {
  window.location.href = 'index.html';
}

const isTV = contentType === 'tv';

async function loadPage() {
  // Init player
  if (isTV) {
    await Player.init(contentId, 'tv', currentSeason, currentEpisode);
  } else {
    await Player.init(contentId);
  }

  // Fetch metadata
  if (isTV) {
    await loadTVPage();
  } else {
    await loadMoviePage();
  }
}

async function loadMoviePage() {
  const movieData = await API.details(contentId);
  if (!movieData) {
    document.getElementById('playerInfo').innerHTML = `
      <p style="color:#aaa;">Failed to load movie data.</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:16px;">Go Home</a>
    `;
    return;
  }

  document.title = `${movieData.title} — EmilyFlix`;

  const year = API.getYear(movieData.release_date);
  const rating = API.formatRating(movieData.vote_average);
  const runtime = API.formatRuntime(movieData.runtime);
  const genres = (movieData.genres || []).map(g => g.name);

  document.getElementById('playerInfo').innerHTML = `
    <a href="javascript:history.back()" class="back-btn">&larr; Back</a>
    <h1 class="player-title">${movieData.title}</h1>
    <div class="player-meta">
      <span style="color:#46d369;font-weight:700;">&star; ${rating}</span>
      <span style="color:#aaa;">${year}</span>
      ${runtime ? `<span style="color:#aaa;">${runtime}</span>` : ''}
      <span style="border:1px solid #555;padding:2px 7px;font-size:0.7rem;border-radius:3px;color:#aaa;">HD</span>
      ${genres.slice(0, 3).map(g => `<span style="background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:20px;font-size:0.75rem;">${g}</span>`).join('')}
    </div>
    <p class="player-description">${movieData.overview || ''}</p>
  `;

  // Cast
  const cast = (movieData.credits?.cast || []).slice(0, 12);
  if (cast.length > 0) {
    const castSection = document.createElement('div');
    castSection.className = 'related-section';
    castSection.innerHTML = `
      <div class="section-title">Cast</div>
      <div class="cast-row">
        ${cast.map(p => `
          <div class="cast-card">
            <img src="${p.profile_path ? API.img(p.profile_path, 'w185') : 'https://via.placeholder.com/80x80/1a1a1a/555?text=?'}"
                 alt="${p.name}" loading="lazy"
                 onerror="this.src='https://via.placeholder.com/80x80/1a1a1a/555?text=?'">
            <div class="cast-name">${p.name}</div>
            <div class="cast-char">${p.character || ''}</div>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('relatedContent').appendChild(castSection);
  }

  // Similar
  const similar = API.filterStreamable(movieData.similar?.results || []);
  if (similar.length > 0) {
    const filteredSimilar = { results: similar, total_results: similar.length };
    await UI.renderSection(
      document.getElementById('relatedContent'),
      'More Like This',
      () => Promise.resolve(filteredSimilar),
      false
    );
  }
}

async function loadTVPage() {
  showData = await API.tvDetails(contentId);
  if (!showData) {
    document.getElementById('playerInfo').innerHTML = `
      <p style="color:#aaa;">Failed to load TV show data.</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:16px;">Go Home</a>
    `;
    return;
  }

  const title = showData.name || 'Unknown';
  document.title = `${title} — EmilyFlix`;

  const year = API.getYear(showData.first_air_date);
  const rating = API.formatRating(showData.vote_average);
  const genres = (showData.genres || []).map(g => g.name);
  const seasons = (showData.seasons || []).filter(s => s.season_number > 0);

  document.getElementById('playerInfo').innerHTML = `
    <a href="javascript:history.back()" class="back-btn">&larr; Back</a>
    <h1 class="player-title">${title}</h1>
    <div class="player-meta">
      <span style="color:#46d369;font-weight:700;">&star; ${rating}</span>
      <span style="color:#aaa;">${year}</span>
      <span style="color:#aaa;">${seasons.length} Season${seasons.length !== 1 ? 's' : ''}</span>
      <span style="border:1px solid #555;padding:2px 7px;font-size:0.7rem;border-radius:3px;color:#aaa;">HD</span>
      ${genres.slice(0, 3).map(g => `<span style="background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:20px;font-size:0.75rem;">${g}</span>`).join('')}
    </div>
    <p class="player-description">${showData.overview || ''}</p>
  `;

  // Show TV controls
  document.getElementById('tvControls').style.display = 'block';

  // Populate season selector
  const seasonSelect = document.getElementById('seasonSelect');
  seasonSelect.innerHTML = seasons.map(s =>
    `<option value="${s.season_number}" ${s.season_number === currentSeason ? 'selected' : ''}>
      Season ${s.season_number} (${s.episode_count} episodes)
    </option>`
  ).join('');

  seasonSelect.addEventListener('change', (e) => {
    currentSeason = parseInt(e.target.value);
    currentEpisode = 1;
    loadEpisodes(currentSeason);
    playEpisode(currentSeason, 1);
  });

  // Load episodes for current season
  await loadEpisodes(currentSeason);

  // Cast
  const cast = (showData.credits?.cast || []).slice(0, 12);
  if (cast.length > 0) {
    const castSection = document.createElement('div');
    castSection.className = 'related-section';
    castSection.innerHTML = `
      <div class="section-title">Cast</div>
      <div class="cast-row">
        ${cast.map(p => `
          <div class="cast-card">
            <img src="${p.profile_path ? API.img(p.profile_path, 'w185') : 'https://via.placeholder.com/80x80/1a1a1a/555?text=?'}"
                 alt="${p.name}" loading="lazy"
                 onerror="this.src='https://via.placeholder.com/80x80/1a1a1a/555?text=?'">
            <div class="cast-name">${p.name}</div>
            <div class="cast-char">${p.character || ''}</div>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('relatedContent').appendChild(castSection);
  }

  // Similar TV shows
  const similar = showData.similar?.results || [];
  if (similar.length > 0) {
    // Tag them as TV for the card component
    similar.forEach(s => { s.media_type = 'tv'; });
    const filteredSimilar = { results: similar.slice(0, 18), total_results: similar.length };
    await UI.renderSection(
      document.getElementById('relatedContent'),
      'More Like This',
      () => Promise.resolve(filteredSimilar),
      false
    );
  }
}

async function loadEpisodes(seasonNum) {
  const grid = document.getElementById('episodesGrid');
  grid.innerHTML = '<div class="spinner"></div>';

  seasonData = await API.tvSeasonDetails(contentId, seasonNum);
  if (!seasonData || !seasonData.episodes) {
    grid.innerHTML = '<p style="color:#aaa;">No episodes found.</p>';
    return;
  }

  grid.innerHTML = seasonData.episodes.map(ep => {
    const thumbUrl = ep.still_path
      ? API.img(ep.still_path, 'w300')
      : 'https://via.placeholder.com/300x169/1a1a1a/555?text=Episode+' + ep.episode_number;
    const isActive = ep.episode_number === currentEpisode && seasonNum === currentSeason;
    const runtime = ep.runtime ? `${ep.runtime}m` : '';

    return `
      <div class="episode-card ${isActive ? 'active' : ''}"
           onclick="playEpisode(${seasonNum}, ${ep.episode_number})"
           data-season="${seasonNum}" data-episode="${ep.episode_number}">
        <div class="episode-card-thumb">
          <img src="${thumbUrl}" alt="Episode ${ep.episode_number}" loading="lazy"
               onerror="this.src='https://via.placeholder.com/300x169/1a1a1a/555?text=Ep+${ep.episode_number}'">
          <div class="episode-card-play">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.6)" stroke="white" stroke-width="1.5"/><polygon points="10,7 18,12 10,17" fill="white"/></svg>
          </div>
        </div>
        <div class="episode-card-info">
          <div class="episode-card-number">Episode ${ep.episode_number}</div>
          <div class="episode-card-title">${ep.name || 'Episode ' + ep.episode_number}</div>
          <div class="episode-card-overview">${ep.overview || ''}</div>
          ${runtime ? `<div class="episode-card-runtime">${runtime}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  updateNextButton();
}

function playEpisode(season, episode) {
  currentSeason = season;
  currentEpisode = episode;

  // Update URL without reload
  const newUrl = `watch.html?id=${contentId}&type=tv&season=${season}&episode=${episode}`;
  history.pushState({}, '', newUrl);

  // Reinit player with new episode
  Player.init(contentId, 'tv', season, episode);

  // Update active episode highlight
  document.querySelectorAll('.episode-card').forEach(card => {
    const cardSeason = parseInt(card.dataset.season);
    const cardEpisode = parseInt(card.dataset.episode);
    card.classList.toggle('active', cardSeason === season && cardEpisode === episode);
  });

  // Scroll to top to see player
  window.scrollTo({ top: 0, behavior: 'smooth' });

  updateNextButton();

  // Update page title
  if (showData) {
    document.title = `${showData.name} S${season}E${episode} — EmilyFlix`;
  }
}

function playNextEpisode() {
  if (!seasonData || !seasonData.episodes) return;

  const maxEp = seasonData.episodes.length;
  if (currentEpisode < maxEp) {
    // Next episode in same season
    playEpisode(currentSeason, currentEpisode + 1);
  } else {
    // Try next season
    const seasons = (showData.seasons || []).filter(s => s.season_number > 0);
    const nextSeason = seasons.find(s => s.season_number === currentSeason + 1);
    if (nextSeason) {
      currentSeason = nextSeason.season_number;
      currentEpisode = 1;
      document.getElementById('seasonSelect').value = currentSeason;
      loadEpisodes(currentSeason);
      playEpisode(currentSeason, 1);
    }
  }
}

function updateNextButton() {
  const btn = document.getElementById('nextEpisodeBtn');
  if (!btn || !seasonData) return;

  const maxEp = seasonData.episodes ? seasonData.episodes.length : 0;
  const seasons = showData ? (showData.seasons || []).filter(s => s.season_number > 0) : [];
  const hasNextEp = currentEpisode < maxEp;
  const hasNextSeason = seasons.some(s => s.season_number === currentSeason + 1);

  if (hasNextEp) {
    btn.style.display = 'inline-flex';
    btn.textContent = `Next: Episode ${currentEpisode + 1} ▶`;
  } else if (hasNextSeason) {
    btn.style.display = 'inline-flex';
    btn.textContent = `Next Season ▶`;
  } else {
    btn.style.display = 'none';
  }
}

// Search
document.getElementById('searchClose')?.addEventListener('click', () => {
  document.getElementById('searchOverlay').classList.remove('active');
});
document.getElementById('searchInput')?.addEventListener('input', async (e) => {
  const q = e.target.value.trim();
  if (!q) { document.getElementById('searchResults').innerHTML = ''; return; }
  const data = await API.searchMulti(q);
  const container = document.getElementById('searchResults');
  container.innerHTML = '';
  if (data?.results) {
    data.results.slice(0, 12).forEach(m => container.appendChild(UI.card(m)));
  }
});

Modal.init();
loadPage();
</script>
</body>
</html>
