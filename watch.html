<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch — BoomFlix</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <style>
    .player-page { background: #000; }
    .player-iframe-wrapper {
      width: 100%;
      position: relative;
      background: #000;
    }
    .player-iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .related-section {
      padding: 20px 4%;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--light-gray);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 16px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--white); }
    .cast-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 10px 0 20px;
      scrollbar-width: none;
    }
    .cast-row::-webkit-scrollbar { display: none; }
    .cast-card {
      flex: 0 0 100px;
      text-align: center;
    }
    .cast-card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--dark3);
      margin-bottom: 8px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .cast-name {
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cast-char {
      font-size: 0.65rem;
      color: var(--light-gray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .loading-player {
      width: 100%;
      aspect-ratio: 16/9;
      max-height: 85vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-player p {
      color: var(--light-gray);
      font-size: 0.9rem;
    }
  </style>
</head>
<body class="player-page">

<!-- NAVBAR -->
<nav class="navbar solid" id="navbar">
  <div class="navbar-left">
    <a href="index.html" class="logo">Boom<span>Flix</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="movies.html">Movies</a></li>
    </ul>
  </div>
  <div class="navbar-right">
    <button class="search-btn" onclick="window.location.href='index.html'" title="Search">🔍</button>
  </div>
</nav>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <button class="search-close" id="searchClose">✕</button>
  <div class="search-box">
    <span class="search-icon-inside">🔍</span>
    <input type="text" id="searchInput" placeholder="Search movies..." autocomplete="off">
  </div>
  <div class="search-results-grid" id="searchResults"></div>
</div>

<!-- PLAYER -->
<div class="player-page" style="padding-top: 68px;">
  <div class="player-container">
    <div class="player-iframe-wrapper" id="playerWrapper" style="height: calc(100vw * 9/16); max-height: 85vh;">
      <div class="loading-player" id="playerLoading">
        <div class="spinner"></div>
        <p>Loading stream...</p>
      </div>
    </div>
  </div>

  <div class="player-info" id="playerInfo">
    <div class="skeleton" style="width:60px;height:18px;border-radius:3px;margin-bottom:16px;"></div>
    <div class="skeleton" style="width:400px;max-width:90%;height:44px;border-radius:4px;margin-bottom:12px;"></div>
    <div class="skeleton" style="width:300px;height:18px;border-radius:3px;margin-bottom:20px;"></div>
    <div class="skeleton" style="width:100%;max-width:800px;height:80px;border-radius:4px;"></div>
  </div>

  <div id="relatedContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/player.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const movieId = params.get('id');
let movieData = null;

if (!movieId) {
  window.location.href = 'index.html';
}

async function loadPage() {
  // Init native player
  await Player.init(movieId);

  // Fetch movie metadata
  movieData = await API.details(movieId);
  if (!movieData) {
    document.getElementById('playerInfo').innerHTML = `
      <p style="color:#aaa;">Failed to load movie data.</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:16px;">Go Home</a>
    `;
    return;
  }

  document.title = `${movieData.title} — BoomFlix`;

  const year = API.getYear(movieData.release_date);
  const rating = API.formatRating(movieData.vote_average);
  const runtime = API.formatRuntime(movieData.runtime);
  const genres = (movieData.genres || []).map(g => g.name);

  document.getElementById('playerInfo').innerHTML = `
    <a href="javascript:history.back()" class="back-btn">← Back</a>
    <h1 class="player-title">${movieData.title}</h1>
    <div class="player-meta">
      <span style="color:#46d369;font-weight:700;">★ ${rating}</span>
      <span style="color:#aaa;">${year}</span>
      ${runtime ? `<span style="color:#aaa;">${runtime}</span>` : ''}
      <span style="border:1px solid #555;padding:2px 7px;font-size:0.7rem;border-radius:3px;color:#aaa;">HD</span>
      ${genres.slice(0, 3).map(g => `<span style="background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:20px;font-size:0.75rem;">${g}</span>`).join('')}
    </div>
    <p class="player-description">${movieData.overview || ''}</p>
  `;

  // Cast
  const cast = (movieData.credits?.cast || []).slice(0, 12);
  if (cast.length > 0) {
    const castSection = document.createElement('div');
    castSection.className = 'related-section';
    castSection.innerHTML = `
      <div class="section-title">Cast</div>
      <div class="cast-row">
        ${cast.map(p => `
          <div class="cast-card">
            <img src="${p.profile_path ? API.img(p.profile_path, 'w185') : 'https://via.placeholder.com/80x80/1a1a1a/555?text=?'}"
                 alt="${p.name}" loading="lazy"
                 onerror="this.src='https://via.placeholder.com/80x80/1a1a1a/555?text=?'">
            <div class="cast-name">${p.name}</div>
            <div class="cast-char">${p.character || ''}</div>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('relatedContent').appendChild(castSection);
  }

  // Similar — filter to streamable only
  const similar = API.filterStreamable(movieData.similar?.results || []);
  if (similar.length > 0) {
    const filteredSimilar = { results: similar, total_results: similar.length };
    await UI.renderSection(
      document.getElementById('relatedContent'),
      'More Like This',
      () => Promise.resolve(filteredSimilar),
      false
    );
  }
}

// Search
document.getElementById('searchClose')?.addEventListener('click', () => {
  document.getElementById('searchOverlay').classList.remove('active');
});
document.getElementById('searchInput')?.addEventListener('input', async (e) => {
  const q = e.target.value.trim();
  if (!q) { document.getElementById('searchResults').innerHTML = ''; return; }
  const data = await API.search(q);
  const container = document.getElementById('searchResults');
  container.innerHTML = '';
  if (data?.results) {
    data.results.slice(0, 12).forEach(m => container.appendChild(UI.card(m)));
  }
});

Modal.init();
loadPage();
</script>
</body>
</html>
