<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomFlix Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player { width: 100%; height: 100%; position: relative; }
    #player iframe { width: 100%; height: 100%; border: none; display: block; }
    #clickGuard {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9998; cursor: pointer;
      background: transparent;
    }
    #clickGuard.showPlay {
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
    }
    .play-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(229,9,20,0.9);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #servers {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 12px 16px; display: flex; gap: 8px; align-items: center;
      z-index: 10000; flex-wrap: wrap;
    }
    #servers span { color: #aaa; font-size: 13px; font-family: sans-serif; }
    .srv-btn {
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 6px 16px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-family: sans-serif;
    }
    .srv-btn.active { background: #e50914; }
    .srv-btn:hover { background: rgba(255,255,255,0.3); }
    .srv-btn.active:hover { background: #ff1a1a; }
    #toast {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(229,9,20,0.9); color: white; padding: 8px 20px;
      border-radius: 8px; font-family: sans-serif; font-size: 13px;
      z-index: 10001; display: none; pointer-events: none;
    }
  </style>
</head>
<body>
<div id="player"></div>
<div id="clickGuard" class="showPlay">
  <div class="play-circle" id="playIcon">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
  </div>
</div>
<div id="toast"></div>
<div id="servers"></div>

<script>
// =============================================
// NUCLEAR AD BLOCKER
// =============================================

// Freeze window.open permanently
try {
  Object.defineProperty(window, 'open', {
    value: function() { return null; },
    writable: false, configurable: false
  });
} catch(e) {
  window.open = function() { return null; };
}

// Kill beforeunload
try {
  Object.defineProperty(window, 'onbeforeunload', {
    set: function(){}, get: function(){ return null; }, configurable: false
  });
} catch(e) {}

// Re-enforce every 100ms in case embed overwrites
setInterval(function() {
  try { window.open = function() { return null; }; } catch(e){}
}, 100);

// Snap focus back if ad steals it
window.addEventListener('blur', function() {
  setTimeout(function() { window.focus(); }, 100);
});

// =============================================
// CLICK GUARD — absorbs ad clicks
// =============================================
// How embed ads work:
//   Click 1 on iframe → ad popup fires
//   Click 2 on iframe → ad popup fires
//   Click 3+ → actual player controls work
//
// Our guard sits ON TOP of the iframe and absorbs clicks.
// Each click: we hide guard briefly, let click "through" to iframe,
// then immediately re-show guard. After enough clicks absorbed,
// we remove guard permanently.

var guard = document.getElementById('clickGuard');
var playIcon = document.getElementById('playIcon');
var clickCount = 0;
var CLICKS_TO_ABSORB = 3; // absorb this many clicks before letting user interact freely

guard.addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  clickCount++;

  if (clickCount === 1) {
    // First click: just remove the play button overlay, keep guard transparent
    guard.classList.remove('showPlay');
    playIcon.style.display = 'none';
    showToast('Click once more to start');
    return;
  }

  if (clickCount <= CLICKS_TO_ABSORB) {
    // Clicks 2-3: absorb silently (these are the ad trigger clicks)
    showToast('Ad blocked ✓');
    return;
  }

  // After enough absorbed, remove guard and let user interact with player
  guard.style.display = 'none';
  showToast('Player ready — enjoy!');

  // Re-arm guard after 5s to catch fullscreen/play ad triggers
  setTimeout(function() {
    armPassiveGuard();
  }, 5000);
});

// Passive guard: transparent overlay that absorbs ONE click then hides
function armPassiveGuard() {
  guard.style.display = 'block';
  guard.classList.remove('showPlay');
  playIcon.style.display = 'none';
  guard.style.background = 'transparent';

  // This guard absorbs one click (the ad) then hides
  var absorbed = false;
  guard.onclick = function(e) {
    if (!absorbed) {
      absorbed = true;
      e.preventDefault();
      e.stopPropagation();
      showToast('Ad blocked ✓');
      // Hide guard, re-arm again later
      setTimeout(function() { guard.style.display = 'none'; }, 100);
      setTimeout(armPassiveGuard, 8000);
    }
  };
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(function() {
    t.style.opacity = '0';
    setTimeout(function() { t.style.display = 'none'; }, 300);
  }, 1500);
}

// =============================================
// PLAYER
// =============================================
var params = new URLSearchParams(window.location.search);
var movieId = params.get('id');
var serverIdx = parseInt(params.get('s') || '0');

var SERVERS = [
  function(id) { return 'https://player.videasy.net/movie/' + id; },
  function(id) { return 'https://embed.su/embed/movie/' + id; },
  function(id) { return 'https://multiembed.mov/?video_id=' + id + '&tmdb=1'; },
  function(id) { return 'https://autoembed.co/movie/tmdb/' + id; },
  function(id) { return 'https://vidlink.pro/movie/' + id; },
  function(id) { return 'https://www.2embed.cc/embed/' + id; },
  function(id) { return 'https://vidsrc.cc/v2/embed/movie/' + id; },
  function(id) { return 'https://moviesapi.club/movie/' + id; },
];

function loadServer(idx) {
  if (!movieId || idx >= SERVERS.length) return;
  var url = SERVERS[idx](movieId);
  document.getElementById('player').innerHTML = '<iframe src="' + url + '" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>';
  renderServers(idx);
  // Reset guard
  clickCount = 0;
  guard.style.display = 'flex';
  guard.classList.add('showPlay');
  guard.style.background = '';
  playIcon.style.display = 'flex';
  guard.onclick = null; // reset passive handler
}

function renderServers(active) {
  var el = document.getElementById('servers');
  var html = '<span>Server:</span>';
  for (var i = 0; i < SERVERS.length; i++) {
    html += '<button class="srv-btn ' + (i===active?'active':'') + '" onclick="loadServer(' + i + ')">' + (i+1) + '</button>';
  }
  el.innerHTML = html;
}

loadServer(serverIdx);
</script>
</body>
</html>
