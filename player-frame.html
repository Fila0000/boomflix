<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomFlix Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #player { width: 100%; height: 100%; position: relative; }
    #player iframe { width: 100%; height: 100%; border: none; display: block; }
    #clickGuard {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9998; cursor: pointer;
      background: transparent;
    }
    #clickGuard.visible {
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
    }
    .play-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(229,9,20,0.9);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #servers {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 12px 16px; display: flex; gap: 8px; align-items: center;
      z-index: 10000; flex-wrap: wrap;
    }
    #servers span { color: #aaa; font-size: 13px; font-family: sans-serif; }
    .srv-btn {
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 6px 16px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-family: sans-serif;
    }
    .srv-btn.active { background: #e50914; }
    .srv-btn:hover { background: rgba(255,255,255,0.3); }
    .srv-btn.active:hover { background: #ff1a1a; }
    #adNotice {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(229,9,20,0.9); color: white; padding: 8px 20px;
      border-radius: 8px; font-family: sans-serif; font-size: 13px;
      z-index: 10001; display: none; pointer-events: none;
      animation: fadeout 2s ease forwards;
    }
    @keyframes fadeout { 0%,70% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>
<div id="player"></div>
<div id="clickGuard" class="visible" onclick="handleGuardClick()">
  <div class="play-circle">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
  </div>
</div>
<div id="adNotice">Ad blocked — click again to continue</div>
<div id="servers"></div>

<script>
// =============================================
// AGGRESSIVE AD/POPUP BLOCKER
// =============================================

// 1. Kill window.open completely
window.open = function() { return null; };
Object.defineProperty(window, 'open', {
  value: function() { return null; },
  writable: false, configurable: false
});

// 2. Block beforeunload hijacks
Object.defineProperty(window, 'onbeforeunload', {
  set: function(){}, get: function(){ return null; }, configurable: false
});

// 3. Prevent page navigation by ads
var safeUrl = window.location.href;
Object.defineProperty(window, 'location', {
  get: function() { return document.location; }
});

// 4. Watch for and kill any new windows/tabs
var tabCount = 0;
setInterval(function() {
  // Re-enforce popup block in case embed overwrites it
  try { window.open = function() { return null; }; } catch(e){}
}, 200);

// 5. Block common ad domains via CSP meta tag injection
var meta = document.createElement('meta');
meta.httpEquiv = 'Content-Security-Policy';
meta.content = "child-src blob: https://*.videasy.net https://*.embed.su https://*.multiembed.mov https://*.autoembed.co https://*.vidlink.pro https://*.2embed.cc https://*.vidsrc.cc https://*.moviesapi.club; popup-ancestors 'none';";
document.head.appendChild(meta);

// =============================================
// CLICK GUARD SYSTEM
// =============================================
// Embeds trigger ad popups on: first click, play click, fullscreen click
// We absorb clicks with a transparent guard that re-appears after each interaction

var guardClicks = 0;
var guard = document.getElementById('clickGuard');
var notice = document.getElementById('adNotice');

function handleGuardClick() {
  guardClicks++;
  if (guardClicks === 1) {
    // First click: remove visible overlay, but keep transparent guard for 1 more click
    guard.classList.remove('visible');
    guard.innerHTML = '';
  } else {
    // Second click absorbed (this is usually the ad trigger)
    guard.style.display = 'none';
    showNotice();
    // Re-enable guard after 3 seconds for fullscreen ad triggers
    setTimeout(rearmGuard, 3000);
  }
}

function rearmGuard() {
  guard.style.display = 'block';
  guard.classList.remove('visible');
  guard.innerHTML = '';
  guardClicks = 1; // Next click will dismiss and absorb
}

function showNotice() {
  notice.style.display = 'block';
  notice.style.animation = 'none';
  notice.offsetHeight; // reflow
  notice.style.animation = 'fadeout 2s ease forwards';
  setTimeout(function() { notice.style.display = 'none'; }, 2100);
}

// Also intercept focus events (embeds open ads when they gain focus)
window.addEventListener('blur', function() {
  setTimeout(function() {
    window.focus();
  }, 50);
});

// =============================================
// PLAYER
// =============================================
var params = new URLSearchParams(window.location.search);
var movieId = params.get('id');
var serverIdx = parseInt(params.get('s') || '0');

var SERVERS = [
  function(id) { return 'https://player.videasy.net/movie/' + id; },
  function(id) { return 'https://embed.su/embed/movie/' + id; },
  function(id) { return 'https://multiembed.mov/?video_id=' + id + '&tmdb=1'; },
  function(id) { return 'https://autoembed.co/movie/tmdb/' + id; },
  function(id) { return 'https://vidlink.pro/movie/' + id; },
  function(id) { return 'https://www.2embed.cc/embed/' + id; },
  function(id) { return 'https://vidsrc.cc/v2/embed/movie/' + id; },
  function(id) { return 'https://moviesapi.club/movie/' + id; },
];

function loadServer(idx) {
  if (!movieId || idx >= SERVERS.length) return;
  var url = SERVERS[idx](movieId);
  document.getElementById('player').innerHTML = '<iframe src="' + url + '" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>';
  renderServers(idx);
  // Reset guard for new server
  guardClicks = 0;
  guard.style.display = 'flex';
  guard.classList.add('visible');
  guard.innerHTML = '<div class="play-circle"><svg width="30" height="30" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>';
}

function renderServers(active) {
  var el = document.getElementById('servers');
  var html = '<span>Server:</span>';
  for (var i = 0; i < SERVERS.length; i++) {
    html += '<button class="srv-btn ' + (i===active?'active':'') + '" onclick="loadServer(' + i + ')">' + (i+1) + '</button>';
  }
  el.innerHTML = html;
}

loadServer(serverIdx);
</script>
</body>
</html>
