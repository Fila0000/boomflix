<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoomFlix Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    #shield {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5);
    }
    #shield .play-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(229,9,20,0.9);
      display: flex; align-items: center; justify-content: center;
    }
    #servers {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 12px 16px; display: flex; gap: 8px; align-items: center;
      z-index: 10000; flex-wrap: wrap;
    }
    #servers span { color: #aaa; font-size: 13px; font-family: sans-serif; }
    .srv-btn {
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 6px 16px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-family: sans-serif;
    }
    .srv-btn.active { background: #e50914; }
    .srv-btn:hover { background: rgba(255,255,255,0.3); }
    .srv-btn.active:hover { background: #ff1a1a; }
  </style>
</head>
<body>
<div id="player"></div>
<div id="shield" onclick="dismissShield()">
  <div class="play-circle">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
  </div>
</div>
<div id="servers"></div>

<script>
// Block ALL popups and ad redirects
window._realOpen = window.open;
window.open = function() { return null; };

// Block beforeunload hijacks
window.onbeforeunload = null;
Object.defineProperty(window, 'onbeforeunload', { set: function(){}, get: function(){ return null; } });

const params = new URLSearchParams(window.location.search);
const movieId = params.get('id');
const serverIdx = parseInt(params.get('s') || '0');

const SERVERS = [
  (id) => `https://player.videasy.net/movie/${id}`,
  (id) => `https://embed.su/embed/movie/${id}`,
  (id) => `https://multiembed.mov/?video_id=${id}&tmdb=1`,
  (id) => `https://autoembed.co/movie/tmdb/${id}`,
  (id) => `https://vidlink.pro/movie/${id}`,
  (id) => `https://www.2embed.cc/embed/${id}`,
  (id) => `https://vidsrc.cc/v2/embed/movie/${id}`,
  (id) => `https://moviesapi.club/movie/${id}`,
];

function loadServer(idx) {
  if (!movieId || idx >= SERVERS.length) return;
  const url = SERVERS[idx](movieId);
  document.getElementById('player').innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>`;
  renderServers(idx);
}

function renderServers(active) {
  const el = document.getElementById('servers');
  el.innerHTML = '<span>Server:</span>' + SERVERS.map((_, i) =>
    `<button class="srv-btn ${i===active?'active':''}" onclick="loadServer(${i})">${i+1}</button>`
  ).join('');
}

let shieldClicks = 0;
function dismissShield() {
  shieldClicks++;
  // First click removes shield, any popup from embed gets blocked by our window.open override
  if (shieldClicks >= 1) {
    document.getElementById('shield').style.display = 'none';
  }
}

// Intercept any navigation attempts from iframes
window.addEventListener('message', function(e) {
  // Ignore cross-origin redirect messages
}, false);

// Prevent the page itself from being redirected by ads
let currentUrl = window.location.href;
setInterval(function() {
  if (window.location.href !== currentUrl) {
    window.location.href = currentUrl;
  }
}, 500);

loadServer(serverIdx);
</script>
</body>
</html>
